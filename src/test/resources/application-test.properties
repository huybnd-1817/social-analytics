# Test profile cho slice test (@DataJpaTest) — chạy trên H2, không cần Postgres.
# V1__init_schema.sql là DDL Postgres-only nên tắt Flyway; Hibernate tự tạo schema từ entity.
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop

# Fallback theo phase-01: H2 mặc định fail "database has been closed" khi check
# domain constraint sinh từ @JdbcTypeCode(NAMED_ENUM) (Post.platform/status, User.role).
# Dùng URL H2 tường minh với MODE=PostgreSQL + DB_CLOSE_DELAY=-1 thay cho embedded URL tự sinh.
spring.test.database.replace=none
# ${random.uuid} → mỗi test context một DB riêng: tên cố định + DB_CLOSE_DELAY=-1 sẽ
# share state giữa các @DataJpaTest class trong cùng JVM fork (bẫy ngầm khi thêm class mới).
spring.datasource.url=jdbc:h2:mem:${random.uuid};MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# DEV profile  —  active khi SPRING_PROFILES_ACTIVE=dev  (mặc định)
# File này KHÔNG được đưa lên môi trường production.
# ============================================================

# ========================
# DataSource — PostgreSQL local
# ========================
spring.datasource.url=jdbc:postgresql://localhost:5432/social_analytics
spring.datasource.username=postgres
spring.datasource.password=postgres

# ========================
# Flyway — bật migration và hiển thị log khi dev
# ========================
spring.flyway.enabled=true
spring.flyway.out-of-order=false

# ========================
# JPA / Hibernate — verbose cho debug
# ========================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================
# Thymeleaf — tắt cache để hot-reload template
# ========================
spring.thymeleaf.cache=false

# ========================
# springdoc / Swagger UI — bật đầy đủ khi dev
# ========================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ========================
# Logging - verbose để dễ debug
# jdbc.bind để DEBUG (không in giá trị). Chỉ nâng TRACE tạm thời khi cần soi
# bind param — TRACE in MỌI giá trị bind, bao gồm cả access_token/refresh_token
# khi Day-3 lưu SocialAccount → lộ secret ra log.
# ========================
logging.level.com.sunasterisk.socialanalytics=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=DEBUG
logging.level.org.flywaydb=DEBUG

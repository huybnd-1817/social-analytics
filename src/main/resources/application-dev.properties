# ============================================================
# DEV profile  —  active khi SPRING_PROFILES_ACTIVE=dev  (mặc định)
# File này KHÔNG được đưa lên môi trường production.
# ============================================================

# ========================
# DataSource — PostgreSQL local
# ========================
spring.datasource.url=jdbc:postgresql://localhost:5432/social_analytics
spring.datasource.username=postgres
spring.datasource.password=postgres

# ========================
# Flyway — bật migration và hiển thị log khi dev
# ========================
spring.flyway.enabled=true
spring.flyway.out-of-order=false

# ========================
# JPA / Hibernate — verbose cho debug
# ========================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================
# Thymeleaf — tắt cache để hot-reload template
# ========================
spring.thymeleaf.cache=false

# ========================
# D3: OAuth2 Social Login — DEV credentials
# Tạo file .env ở project root (đã gitignore) rồi load trước khi chạy:
#   source .env && ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
# Hoặc set trực tiếp trong IDE run configuration (Environment Variables).
#
# Đăng ký app với provider (mỗi provider cần 1 app riêng cho dev):
#   Facebook: https://developers.facebook.com → Add Product → Facebook Login → Web
#             Redirect URI: http://localhost:8080/login/oauth2/code/facebook
#   Twitter:  https://developer.twitter.com → App → User authentication settings
#             App type: Web App (Confidential client), bật OAuth 2.0
#             Redirect URI: http://localhost:8080/login/oauth2/code/twitter
#
# Nội dung file .env:
#   FACEBOOK_CLIENT_ID=<Meta App ID>
#   FACEBOOK_CLIENT_SECRET=<Meta App Secret>
#   TWITTER_CLIENT_ID=<Twitter OAuth 2.0 Client ID>
#   TWITTER_CLIENT_SECRET=<Twitter OAuth 2.0 Client Secret>
# ========================

# ========================
# springdoc / Swagger UI — bật đầy đủ khi dev
# ========================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ========================
# Logging - verbose để dễ debug
# jdbc.bind để DEBUG (không in giá trị). Chỉ nâng TRACE tạm thời khi cần soi
# bind param — TRACE in MỌI giá trị bind, bao gồm cả access_token/refresh_token
# khi Day-3 lưu SocialAccount → lộ secret ra log.
# ========================
logging.level.com.sunasterisk.socialanalytics=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=DEBUG
logging.level.org.flywaydb=DEBUG

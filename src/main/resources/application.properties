# ========================
# Application
# ========================
spring.application.name=social-analytics
# Load file .env từ thư mục gốc project (nếu có). optional: không crash khi thiếu file.
# [.properties] báo Spring đọc theo định dạng key=value (giống .properties).
spring.config.import=optional:file:.env[.properties]
# Profile đọc từ biến môi trường SPRING_PROFILES_ACTIVE, mặc định là dev
# khi không set (chạy local không cần cấu hình gì thêm).
# Trên môi trường triển khai PHẢI set biến môi trường tường minh:
#   - Biến môi trường : SPRING_PROFILES_ACTIVE=prod
#   - JVM arg         : -Dspring.profiles.active=prod
#   - IDE (IntelliJ)  : Run/Debug Configuration → Active Profiles = dev
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ========================
# Server
# ========================
server.port=8080

# ========================
# DataSource
# url / username / password được định nghĩa theo từng profile
# ========================
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate
# ddl-auto=none      → dùng Flyway quản lý schema, không để Hibernate tự sửa
# open-in-view=false → TẮT Open Session in View: Hibernate session bị đóng sau
#                      khi thoát khỏi tầng service, KHÔNG còn mở đến tận view/controller.
#                      Mục đích: buộc fetch đầy đủ dữ liệu bên trong transaction ở
#                      tầng service, tránh các query ẩn không kiểm soát được.
#                      Lưu ý: truy cập lazy relation ngoài transaction (ở controller
#                      hoặc template) sẽ ném LazyInitializationException — đây là
#                      hành vi có chủ đích để phát hiện sớm vấn đề fetching strategy.
# show-sql / format_sql được override theo từng profile
# dialect KHÔNG khai báo — Hibernate 6+ tự detect từ JDBC metadata
# ========================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ========================
# Multipart — upload file Excel (/import-posts)
# Mặc định Boot chỉ cho 1MB — quá nhỏ cho file .xlsx thực tế.
# max-request-size nhỉnh hơn max-file-size để chừa chỗ cho phần form-data còn lại.
# ========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

# ========================
# Spring Data Web — phân trang
# max-page-size          → chặn ?size=2000 kéo cả bảng (chống resource exhaustion)
# serialization-mode     → JSON contract ổn định cho Page (content + page{...}),
#                          thay vì serialize trực tiếp PageImpl (không ổn định giữa các version)
# ========================
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.serialization-mode=via_dto

# ========================
# Flyway — Database Migration
# Flyway tự động chạy các script trong db/migration khi khởi động
# Script SQL nằm trong classpath:db/migration
# KHÔNG bật baseline-on-migrate: project greenfield, DB phải sạch khi migrate lần đầu —
# baseline sẽ che giấu việc trỏ nhầm vào một DB đã có dữ liệu khác
# enabled / out-of-order được override theo từng profile
# ========================
spring.flyway.locations=classpath:db/migration

# ========================
# Thymeleaf
# cache được override theo từng profile (false ở dev, true ở prod)
# ========================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ========================
# D3: Spring Security OAuth2 Social Login
# Client-id / client-secret đọc từ biến môi trường; placeholder-* để app khởi động
# không crash khi chưa có credentials thật (Spring Boot yêu cầu chuỗi không rỗng).
# PKCE tự động bật trong Spring Security 7 cho tất cả authorization_code flow.
# ========================

# Facebook — CommonOAuth2Provider built-in (auth-uri, token-uri, user-info-uri tự động)
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:placeholder-fb}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:placeholder-fb-secret}
spring.security.oauth2.client.registration.facebook.scope=public_profile,email

# Twitter/X — manual provider registration (không có trong CommonOAuth2Provider)
spring.security.oauth2.client.registration.twitter.client-id=${TWITTER_CLIENT_ID:placeholder-tw}
spring.security.oauth2.client.registration.twitter.client-secret=${TWITTER_CLIENT_SECRET:placeholder-tw-secret}
spring.security.oauth2.client.registration.twitter.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.twitter.client-authentication-method=client_secret_basic
spring.security.oauth2.client.registration.twitter.scope=users.read,tweet.read,offline.access
spring.security.oauth2.client.registration.twitter.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.twitter.provider=twitter
spring.security.oauth2.client.provider.twitter.authorization-uri=https://x.com/i/oauth2/authorize
spring.security.oauth2.client.provider.twitter.token-uri=https://api.twitter.com/2/oauth2/token
spring.security.oauth2.client.provider.twitter.user-info-uri=https://api.twitter.com/2/users/me?user.fields=name,username
spring.security.oauth2.client.provider.twitter.user-info-authentication-method=header
spring.security.oauth2.client.provider.twitter.user-name-attribute=data

# ========================
# springdoc / Swagger UI
# api-docs.path      → endpoint trả về OpenAPI JSON spec
# swagger-ui.path    → URL vào trang Swagger UI (redirect đến /swagger-ui/index.html)
# operations-sorter  → sắp xếp endpoint theo HTTP method trong mỗi tag
# tags-sorter        → sắp xếp các tag theo alphabet
# try-it-out-enabled → bật sẵn nút "Try it out" đỡ phải click thêm
# enabled của api-docs / swagger-ui được override theo từng profile
# (bật ở dev, TẮT ở prod — không lộ cấu trúc API ra ngoài)
# ========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.display-request-duration=true

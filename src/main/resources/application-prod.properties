# ============================================================
# PROD profile  —  active khi SPRING_PROFILES_ACTIVE=prod
# Tất cả thông tin nhạy cảm đọc từ biến môi trường (không hardcode).
# ============================================================

# ========================
# DataSource — PostgreSQL production
# Đặt các biến môi trường trên server:
#   DB_URL      = jdbc:postgresql://<host>:5432/<dbname>
#   DB_USERNAME = <db_user>
#   DB_PASSWORD = <db_password>
# ========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ========================
# Flyway — bật migration trên production
# out-of-order=false: đảm bảo migration chạy đúng thứ tự version
# ========================
spring.flyway.enabled=true
spring.flyway.out-of-order=false

# ========================
# JPA / Hibernate — tắt log SQL để giảm noise & tránh lộ query
# ========================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ========================
# Thymeleaf — bật cache để tăng hiệu năng
# ========================
spring.thymeleaf.cache=true

# ========================
# springdoc / Swagger UI — mặc định TẮT trên production
# Không expose OpenAPI spec & Swagger UI ra ngoài: lộ cấu trúc API,
# tên field, endpoint nội bộ → tăng bề mặt tấn công.
# Cần xem docs tạm thời ở prod → set biến môi trường rồi restart:
#   SPRINGDOC_API_DOCS_ENABLED=true SPRINGDOC_SWAGGER_UI_ENABLED=true
# (nhớ tắt lại sau khi dùng xong)
# ========================
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:false}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:false}

# ========================
# Logging - chỉ ghi WARNING trở lên, tránh lộ thông tin
# ========================
logging.level.root=WARN
logging.level.com.sunasterisk.socialanalytics=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# Ghi log ra file để dễ theo dõi trên server
logging.file.name=/var/log/social-analytics/app.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=300MB

# ========================
# Reverse proxy — tin cậy X-Forwarded-* từ proxy phía trước (nginx/LB)
# Bắt buộc để request.getRemoteAddr() trả về IP thật của client thay vì IP proxy.
# CẢNH BÁO: strategy=framework tin X-Forwarded-* từ MỌI nguồn — client gọi thẳng
# vào app (không qua proxy) có thể giả mạo IP. Trước khi Day-3 làm rate-limit
# theo IP, PHẢI giới hạn nguồn tin cậy (server.tomcat.remoteip.trusted-proxies)
# hoặc đảm bảo app chỉ nhận traffic từ proxy (firewall/network policy).
# ========================
server.forward-headers-strategy=framework

# ========================
# Server — nén response để giảm bandwidth
# ========================
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json
server.compression.min-response-size=1024

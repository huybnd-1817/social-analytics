<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Analytics — Dashboard</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 960px;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.10);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            margin: 0 auto 2rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 0.9rem;
            margin-bottom: 1.75rem;
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.75rem;
        }

        .info-table td {
            padding: 0.6rem 0.5rem;
            font-size: 0.9rem;
            border-bottom: 1px solid #f3f4f6;
        }

        .info-table td:first-child {
            color: #6b7280;
            font-weight: 500;
            width: 30%;
            white-space: nowrap;
        }

        .info-table td:last-child {
            color: #1a1a2e;
            font-weight: 400;
            word-break: break-all;
        }

        .info-table tr:last-child td { border-bottom: none; }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .badge-facebook { background: #e7f0fd; color: #1877f2; }
        .badge-twitter  { background: #f0f0f0; color: #111; }

        .na { color: #9ca3af; font-style: italic; }

        .btn-logout {
            width: 100%;
            padding: 0.75rem 1.25rem;
            border: none;
            border-radius: 6px;
            background: #f3f4f6;
            color: #374151;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-logout:hover { background: #e5e7eb; }

        .live-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            font-size: 0.82rem;
        }

        .ws-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .ws-connecting { background: #f59e0b; }
        .ws-connected  { background: #10b981; }
        .ws-error      { background: #ef4444; }

        .ws-label { color: #6b7280; }

        .ws-update {
            margin-left: auto;
            color: #374151;
            font-weight: 500;
        }

        /* Charts */
        .charts {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .chart-card {
            flex: 1 1 380px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.10);
            padding: 1.5rem;
        }

        .chart-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Social Analytics</h1>
        <p class="subtitle" th:text="'Welcome, ' + ${name}">Welcome, User</p>

        <table class="info-table">
            <tr>
                <td>Email</td>
                <td th:if="${email != null}" th:text="${email}">user@example.com</td>
                <td th:if="${email == null}" class="na">N/A</td>
            </tr>
            <tr>
                <td>Provider</td>
                <td>
                    <!-- chỉ hỗ trợ 2 provider: facebook / twitter; provider khác sẽ hiển thị như twitter -->
                    <span th:classappend="${provider == 'facebook'} ? 'badge-facebook' : 'badge-twitter'"
                          class="badge"
                          th:text="${provider == 'facebook'} ? 'Facebook' : 'X (Twitter)'">
                        Facebook
                    </span>
                </td>
            </tr>
            <tr>
                <td>Last Updated</td>
                <td th:if="${lastCrawledAt != null}" th:text="${lastCrawledAt}">2026-07-15T07:00:00Z</td>
                <td th:if="${lastCrawledAt == null}" class="na">Never</td>
            </tr>
        </table>

        <!-- D05-10: live metrics status bar -->
        <div class="live-bar">
            <span id="wsDot" class="ws-dot ws-connecting"></span>
            <span id="wsLabel" class="ws-label">Connecting…</span>
            <span id="wsUpdate" class="ws-update" style="display:none"></span>
        </div>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn-logout">Logout</button>
        </form>
    </div>

    <!-- D05-12: charts -->
    <div class="charts">
        <div class="chart-card">
            <div class="chart-title">Likes over Time</div>
            <canvas id="likesChart"></canvas>
        </div>
        <div class="chart-card">
            <div class="chart-title">Shares by Platform</div>
            <canvas id="sharesChart"></canvas>
        </div>
    </div>
</div>

<!-- @stomp/stompjs v7 — native WebSocket STOMP client (SockJS removed in Spring 7) -->
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
<!-- Chart.js v4 -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
(function () {
    const dot    = document.getElementById('wsDot');
    const label  = document.getElementById('wsLabel');
    const update = document.getElementById('wsUpdate');

    // Màu theo platform — giữ nhất quán giữa line chart và bar chart
    const PLATFORM_COLORS = {
        FACEBOOK: '#1877f2',
        TWITTER:  '#14171A'
    };

    function colorFor(platform) {
        return PLATFORM_COLORS[platform] || '#6b7280';
    }

    function setStatus(state, text) {
        dot.className = 'ws-dot ws-' + state;
        label.textContent = text;
    }

    /* ---- Charts ---- */

    let likesChart  = null;
    let sharesChart = null;

    function refreshCharts(data) {
        // Line chart: likes theo ngày, mỗi platform một đường
        var lineDatasets = data.datasets.map(function (d) {
            var color = colorFor(d.platform);
            return {
                label: d.platform,
                data: d.likes,
                borderColor: color,
                backgroundColor: color + '33',
                tension: 0.3,
                fill: false,
                pointRadius: 3
            };
        });

        if (likesChart) {
            likesChart.data.labels   = data.labels;
            likesChart.data.datasets = lineDatasets;
            likesChart.update();
        } else {
            likesChart = new Chart(document.getElementById('likesChart'), {
                type: 'line',
                data: { labels: data.labels, datasets: lineDatasets },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'top' } },
                    scales:  { y: { beginAtZero: true } }
                }
            });
        }

        // Bar chart: tổng shares theo platform
        var barLabels = data.datasets.map(function (d) { return d.platform; });
        var barData   = data.datasets.map(function (d) {
            return d.shares.reduce(function (sum, v) { return sum + v; }, 0);
        });
        var barColors = barLabels.map(colorFor);

        if (sharesChart) {
            sharesChart.data.labels                   = barLabels;
            sharesChart.data.datasets[0].data         = barData;
            sharesChart.data.datasets[0].backgroundColor = barColors;
            sharesChart.update();
        } else {
            sharesChart = new Chart(document.getElementById('sharesChart'), {
                type: 'bar',
                data: {
                    labels: barLabels,
                    datasets: [{
                        label: 'Total Shares',
                        data: barData,
                        backgroundColor: barColors
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales:  { y: { beginAtZero: true } }
                }
            });
        }
    }

    // Tải dữ liệu chart ngay khi trang mở
    function initCharts() {
        fetch('/chart-data')
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (data) { if (data) refreshCharts(data); });
    }

    /* ---- WebSocket ---- */

    const wsUrl = (location.protocol === 'https:' ? 'wss:' : 'ws:')
                + '//' + location.host + '/ws';

    const client = new StompJs.Client({
        brokerURL: wsUrl,
        reconnectDelay: 5000,
        onConnect: function () {
            setStatus('connected', 'Live');
            client.subscribe('/topic/metrics-update', function (msg) {
                const payload = JSON.parse(msg.body);
                onMetricsUpdate(payload);
            });
        },
        onDisconnect:     function () { setStatus('error', 'Disconnected'); },
        onStompError:     function () { setStatus('error', 'Error'); },
        onWebSocketError: function () { setStatus('error', 'Connection failed'); }
    });

    client.activate();

    function onMetricsUpdate(payload) {
        const time = new Date(payload.updatedAt).toLocaleTimeString();
        update.textContent = payload.event + ' · ' + time;
        update.style.display = '';

        fetch('/chart-data')
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (data) { if (data) refreshCharts(data); });
    }

    initCharts();
}());
</script>
</body>
</html>
